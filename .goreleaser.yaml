# .goreleaser.yaml
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: iwashere
    main: ./cmd/iwashere
    binary: iwashere
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
      - "386"
    ignore:
      - goos: darwin
        goarch: "386"
    ldflags:
      - -s -w 
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
      - -X main.builtBy=goreleaser

archives:
  - id: archives
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

nfpms:
  - id: packages
    package_name: iwashere
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    
    # This is just documentation - point to your repo
    homepage: https://github.com/Murchoid/iwashere
    description: |-
      iwashere - Context preservation tool for developers
      Never lose your train of thought again. Track your coding
      context with git integration, sessions, and team sharing.
    maintainer: Michael kamau kamaucoder@gmail.com
    license: MIT
    
    # These are the actual binaries to include
    contents:
      - src: ./iwashere  # This is the built binary
        dst: /usr/local/bin/iwashere
        file_info:
          mode: 0755
    
    formats:
      - deb
      - rpm
      - apk
      - archlinux

brews:
  - name: iwashere
    homepage: https://github.com/Murchoid/iwashere
    description: "Context preservation tool for developers"
    license: "MIT"
    repository:
      owner: Murchoid
      name: homebrew-iwashere
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    
    # This tells Homebrew where to find the binaries
    url_template: "https://github.com/Murchoid/iwashere/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    
    commit_author:
      name: goreleaserbot
      email: bot@example.com
    
    test: |
      system "#{bin}/iwashere --version"

scoops:
  - name: iwashere
    homepage: https://github.com/Murchoid/iwashere
    description: "Context preservation tool for developers"
    license: "MIT"
    repository:
      owner: Murchoid
      name: scoop-iwashere
      token: "{{ .Env.SCOOP_TOKEN }}"
    
    url_template: "https://github.com/Murchoid/iwashere/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    
    commit_author:
      name: goreleaserbot
      email: bot@example.com

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^Merge pull request'
      - '^Merge branch'