# .goreleaser.yaml
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: iwashere
    main: ./cmd/
    binary: iwashere
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
      - "386"
    ignore:
      - goos: darwin
        goarch: "386"

    ldflags:
      - -s -w
      - -X github.com/Murchoid/iwashere/internal/commands.Version={{ .Version }}
      - -X github.com/Murchoid/iwashere/internal/commands.Commit={{ .Commit }}

archives:
  - id: archives
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

nfpms:
  - id: packages
    package_name: iwashere
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    
    homepage: https://github.com/Murchoid/iwashere
    description: "iwashere - Context preservation tool"
    maintainer: Michael Kamau kamaucoder@gmail.com
    license: MIT
    
    # Simpler approach - use the build ID
    builds:
      - iwashere  # This matches your build id
    
    formats:
      - deb
      - rpm
      - apk

brews:
  - name: iwashere
    homepage: https://github.com/Murchoid/iwashere
    description: "Context preservation tool for developers"
    license: "MIT"
    repository:
      owner: Murchoid
      name: homebrew-iwashere
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    
    # This tells Homebrew where to find the binaries
    url_template: "https://github.com/Murchoid/iwashere/releases/tag/{{ .Tag }}/{{ .ArtifactName }}"
    
    commit_author:
      name: goreleaserbot
      email: bot@example.com
    
    test: |
      system "#{bin}/iwashere --version"

scoops:
  - name: iwashere
    homepage: https://github.com/Murchoid/iwashere
    description: "Context preservation tool for developers"
    license: "MIT"
    repository:
      owner: Murchoid
      name: scoop-iwashere
      token: "{{ .Env.SCOOP_TOKEN }}"
    
    url_template: "https://github.com/Murchoid/iwashere/releases/tag/{{ .Tag }}/{{ .ArtifactName }}"
    
    commit_author:
      name: goreleaserbot
      email: bot@example.com

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^Merge pull request'
      - '^Merge branch'